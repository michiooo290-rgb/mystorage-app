<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyStorage — Viewer</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <link rel="stylesheet" href="../styles/nightmode.css"/>
  <script src="../scripts/nightmode.js"></script>
  <style>
    /* ══════════════════════════════════════════════
       MyStorage — viewer.html
       Tema: Warm Paper / Ink — seragam dengan dashboard
       ══════════════════════════════════════════════ */

    :root {
      --ink:     #0f0e0d;
      --ink-2:   #2a2825;
      --ink-3:   #5a5754;
      --ink-4:   #9a9693;
      --ink-5:   #c8c4c0;
      --paper:   #f7f5f2;
      --paper-2: #efece8;
      --paper-3: #e8e4df;
      --white:   #fdfcfb;
      --border:   rgba(15,14,13,0.08);
      --border-2: rgba(15,14,13,0.14);
      --border-3: rgba(15,14,13,0.22);
      --accent:      #c8602a;
      --accent-2:    #a84e20;
      --accent-light: rgba(200,96,42,0.08);
      --green:  #2d6a4f;
      --red:    #c0392b;
      --shadow-sm: 0 2px 8px rgba(15,14,13,0.08);
      --shadow-md: 0 4px 20px rgba(15,14,13,0.10);
      --shadow-lg: 0 12px 40px rgba(15,14,13,0.12);
      --radius-sm: 10px;
      --radius:    14px;
      --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Outfit', sans-serif;
      background: var(--paper);
      color: var(--ink-2);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain texture — sama dengan dashboard */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.022;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Topbar — gaya sama dengan dashboard topbar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px;
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow-sm);
    }

    /* Logo area kecil di kiri */
    .topbar-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .topbar-logo-icon {
      width: auto; height: auto;
      background: transparent;
      border: none;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff;
      transition: transform 0.25s var(--ease-spring);
    }
    .topbar-logo:hover .topbar-logo-icon { transform: rotate(-8deg) scale(1.08); }
    .topbar-logo-name {
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.03em;
    }

    .topbar-divider {
      width: 1px; height: 20px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    .btn-back {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      color: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-back:hover {
      background: var(--accent-light);
      border-color: rgba(200,96,42,0.3);
      color: var(--accent);
    }
    .btn-back i { transition: transform 0.2s var(--ease-spring); }
    .btn-back:hover i { transform: translateX(-3px); }

    .file-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 1px;
    }
    .file-title {
      font-size: 13.5px; font-weight: 600;
      color: rgba(255,255,255,0.92);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-meta {
      font-size: 11px; color: rgba(255,255,255,0.45);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }

    .btn-action {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-action:hover {
      background: var(--accent-light);
      border-color: rgba(200,96,42,0.3);
      color: var(--accent);
    }
    .btn-action i { transition: transform 0.25s var(--ease-spring); }
    .btn-action:hover i { transform: scale(1.15); }

    .btn-action.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }
    .btn-action.primary:hover {
      background: var(--ink-2);
      border-color: var(--ink-2);
      color: var(--white);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    /* ── Viewer content area ── */
    .viewer-wrap {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Loading state ── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      color: var(--ink-4);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-state p { font-size: 14px; color: var(--ink-4); }

    /* ── Error state ── */
    .error-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 40px;
    }
    .error-state i { font-size: 52px; color: var(--red); opacity: 0.6; }
    .error-state h3 { font-size: 18px; font-weight: 600; color: var(--ink); font-family: 'Outfit', sans-serif; }
    .error-state p { font-size: 13px; color: var(--ink-4); max-width: 380px; line-height: 1.6; }

    /* ── PDF viewer ── */
    iframe.pdf-viewer {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    /* ── Image viewer ── */
    .img-viewer-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      overflow: auto;
    }
    .img-viewer-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
    }

    /* ── Video player ── */
    .video-viewer-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: var(--ink);
    }
    video {
      max-width: 100%; max-height: 100%;
      border-radius: var(--radius);
      box-shadow: 0 8px 48px rgba(15,14,13,0.5);
    }

    /* ── Audio player ── */
    .audio-viewer-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 40px;
    }
    .audio-icon-big {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(200,96,42,0.25);
      animation: pulse-ring 2s ease-in-out infinite;
    }
    .audio-icon-big i { font-size: 44px; color: var(--accent); }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(200,96,42,0.2); }
      50%      { box-shadow: 0 0 0 16px rgba(200,96,42,0.04); }
    }
    .audio-name {
      font-size: 18px; font-weight: 600; color: var(--ink);
      text-align: center; max-width: 360px;
      font-family: 'Outfit', sans-serif;
    }
    audio { width: 380px; max-width: 90vw; accent-color: var(--accent); }

    /* ── Generic / unsupported ── */
    .generic-viewer {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px; text-align: center;
    }
    .generic-icon-box {
      width: 90px; height: 90px;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      border: 1px solid var(--border-2);
    }
    .generic-viewer h3 { font-size: 18px; font-weight: 600; color: var(--ink); font-family: 'Outfit', sans-serif; }
    .generic-viewer p { font-size: 13px; color: var(--ink-4); max-width: 340px; line-height: 1.7; }

    /* Office preview bottom bar */
    .office-bottom-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 10px 16px;
      background: var(--white);
      border-top: 1px solid var(--border-2);
      flex-shrink: 0; flex-wrap: wrap;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px;
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 10px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: all 0.3s var(--ease-spring);
    }
    .toast.show { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a class="topbar-logo" href="../Storage-dashboard.html">
    <div class="topbar-logo-icon"><img src="../assets/logo.png" alt="MyStorage" style="width:36px;height:36px;object-fit:contain;"></div>
    <span class="topbar-logo-name">MyStorage</span>
  </a>
  <div class="topbar-divider"></div>
  <a class="btn-back" href="../Storage-dashboard.html">
    <i class="ti ti-arrow-left"></i> Kembali
  </a>
  <div class="file-info">
    <div class="file-title" id="fileTitle">Memuat file...</div>
    <div class="file-meta" id="fileMeta"></div>
  </div>
  <div class="topbar-actions">
    <button class="btn-action" id="btnShare" onclick="shareFile()">
      <i class="ti ti-share"></i> Bagikan
    </button>
    <button class="btn-action primary" id="btnDownload" onclick="downloadFile()">
      <i class="ti ti-download"></i> Download
    </button>
  </div>
</div>

<!-- Viewer -->
<div class="viewer-wrap" id="viewerWrap">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Memuat file...</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="ti ti-check" style="font-size:16px;flex-shrink:0" id="toastIcon"></i>
  <span id="toastMsg">Berhasil!</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../scripts/supabase-config.js"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  /* ── Safe HTML escape (prevents XSS) ── */
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str || '');
    return d.innerHTML;
  }

  let signedUrl = null;

  const params      = new URLSearchParams(window.location.search);
  const storagePath = params.get('path');
  const fileName    = params.get('name');
  const fileType    = params.get('type');
  const fileSize    = params.get('size');

  const FILE_ICONS = {
    pdf:         { icon: 'ti-file-type-pdf', color: '#c0392b', bg: 'rgba(192,57,43,0.08)' },
    doc:         { icon: 'ti-file-text',     color: '#1d4ed8', bg: 'rgba(29,78,216,0.08)' },
    foto:        { icon: 'ti-photo',         color: '#2d6a4f', bg: 'rgba(45,106,79,0.08)' },
    video:       { icon: 'ti-video',         color: '#c8602a', bg: 'rgba(200,96,42,0.08)' },
    spreadsheet: { icon: 'ti-table',         color: '#0369a1', bg: 'rgba(3,105,161,0.08)' },
    audio:       { icon: 'ti-music',         color: '#7e22ce', bg: 'rgba(126,34,206,0.08)' },
  };

  function hideOfficeLoading() {
    const overlay = document.getElementById('officeLoadingOverlay');
    if (overlay) overlay.style.display = 'none';
  }

  function reloadOfficePreview(gdocsUrl) {
    const frame = document.getElementById('officeFrame');
    const overlay = document.getElementById('officeLoadingOverlay');
    if (overlay) overlay.style.display = 'flex';
    if (frame) { frame.src = ''; setTimeout(() => { frame.src = gdocsUrl; }, 300); }
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    const icon = document.getElementById('toastIcon');
    document.getElementById('toastMsg').textContent = msg;
    icon.className = isError ? 'ti ti-alert-circle' : 'ti ti-check';
    icon.style.color = isError ? '#f87171' : '#4ade80';
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function showError(msg, detail) {
    document.getElementById('loadingState').remove();
    document.getElementById('viewerWrap').innerHTML = `
      <div class="error-state">
        <i class="ti ti-file-alert"></i>
        <h3>${escapeHtml(msg)}</h3>
        <p>${escapeHtml(detail)}</p>
        <a href="../Storage-dashboard.html" class="btn-action" style="margin-top:8px">
          <i class="ti ti-arrow-left"></i> Kembali ke Dashboard
        </a>
      </div>`;
  }

  async function renderViewer(url, type, name) {
    const wrap = document.getElementById('viewerWrap');

    if (type === 'pdf') {
      wrap.innerHTML = `<iframe class="pdf-viewer" src="${escapeHtml(url)}" title="${escapeHtml(name)}"></iframe>`;
    }
    else if (type === 'foto') {
      wrap.innerHTML = `
        <div class="img-viewer-wrap">
          <img src="${escapeHtml(url)}" alt="${escapeHtml(name)}" onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.4s ease"/>
        </div>`;
    }
    else if (type === 'video') {
      wrap.innerHTML = `
        <div class="video-viewer-wrap">
          <video controls autoplay>
            <source src="${url}">
            <source src="${escapeHtml(url)}">
            Browser Anda tidak mendukung pemutaran video.
          </video>
        </div>`;
    }
    else if (type === 'audio') {
      const nameEsc = escapeHtml(name);
      wrap.innerHTML = `
        <div class="audio-viewer-wrap">
          <div class="audio-icon-big"><i class="ti ti-music"></i></div>
          <div class="audio-name">${nameEsc}</div>
          <audio controls autoplay>
            <source src="${escapeHtml(url)}">
            Browser Anda tidak mendukung pemutaran audio.
          </audio>
        </div>`;
    }
    else if (type === 'spreadsheet' || type === 'doc') {
      const ext = name.split('.').pop() || '';
      const officeExts = ['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'];
      if (officeExts.includes(ext.toLowerCase())) {
        const gdocsUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
        const nameEsc  = escapeHtml(name);
        const gdocsEsc = escapeHtml(gdocsUrl);
        wrap.innerHTML = `
          <div style="position:relative;width:100%;height:100%;display:flex;flex-direction:column;">
            <div id="officeLoadingOverlay" style="position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
              align-items:center;justify-content:center;gap:14px;background:var(--paper);pointer-events:none;">
              <div class="spinner"></div>
              <p style="font-size:14px;color:var(--ink-4)">Memuat preview via Google Docs...</p>
              <p style="font-size:12px;color:var(--ink-5)">Mungkin perlu beberapa detik</p>
            </div>
            <iframe
              id="officeFrame"
              src="${gdocsEsc}"
              title="${nameEsc}"
              style="flex:1;border:none;background:#fff;"
              onload="hideOfficeLoading()"
            ></iframe>
            <div class="office-bottom-bar">
              <span style="font-size:12px;color:var(--ink-4)">Preview tidak muncul?</span>
              <button class="btn-action" onclick="reloadOfficePreview('${gdocsEsc}')">
                <i class="ti ti-refresh"></i> Muat Ulang
              </button>
              <button class="btn-action primary" onclick="downloadFile()">
                <i class="ti ti-download"></i> Download File
              </button>
            </div>
          </div>`;
        return;
      }

      const nameEsc  = escapeHtml(name);
      const iconInfo = FILE_ICONS[type] || FILE_ICONS['doc'];
      wrap.innerHTML = `
        <div class="generic-viewer">
          <div class="generic-icon-box" style="background:${iconInfo.bg}">
            <i class="ti ${iconInfo.icon}" style="color:${iconInfo.color}"></i>
          </div>
          <h3>${nameEsc}</h3>
          <p>Format <strong>${escapeHtml(ext.toUpperCase())}</strong> tidak bisa ditampilkan langsung.<br>Gunakan tombol di bawah untuk mengunduh.</p>
          <button class="btn-action primary" onclick="downloadFile()" style="margin-top:8px">
            <i class="ti ti-download"></i> Download File
          </button>
        </div>`;
    }
    else {
      const iconInfo = FILE_ICONS[type] || FILE_ICONS['doc'];
      const nameEsc = escapeHtml(name);
      wrap.innerHTML = `
        <div class="generic-viewer">
          <div class="generic-icon-box" style="background:${iconInfo.bg}">
            <i class="ti ${iconInfo.icon}" style="color:${iconInfo.color}"></i>
          </div>
          <h3>${nameEsc}</h3>
          <p>Tipe file ini tidak bisa ditampilkan langsung di browser.<br>Gunakan tombol <strong>Download</strong> untuk membuka file ini di aplikasi yang sesuai.</p>
          <button class="btn-action primary" onclick="downloadFile()">
            <i class="ti ti-download"></i> Download File
          </button>
        </div>`;
    }
  }

  async function downloadFile() {
    if (!storagePath) return;
    showToast('Menyiapkan download...');
    const { data, error } = await sb.storage.from('user-files').download(storagePath);
    if (error) { showToast('Gagal download: ' + error.message, true); return; }
    const url = URL.createObjectURL(data);
    const a = document.createElement('a');
    a.href = url; a.download = fileName || 'file';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Download dimulai!');
  }

  async function shareFile() {
    if (!storagePath) return;
    showToast('Membuat link...');
    const { data, error } = await sb.storage.from('user-files').createSignedUrl(storagePath, 604800);
    if (error) { showToast('Gagal membuat link: ' + error.message, true); return; }

    try {
      let saved = JSON.parse(localStorage.getItem('myStorageShared') || '[]');
      saved = saved.filter(function(s) { return s.fileId !== storagePath; });
      saved.unshift({
        fileId: storagePath,
        name: fileName || 'File',
        url: data.signedUrl,
        type: fileType || 'doc',
        folder: storagePath.split('/')[0] || '',
        createdAt: Date.now()
      });
      if (saved.length > 50) saved = saved.slice(0, 50);
      localStorage.setItem('myStorageShared', JSON.stringify(saved));
    } catch(e) { console.warn('Gagal simpan shared link:', e); }

    try {
      await navigator.clipboard.writeText(data.signedUrl);
      showToast('Link berhasil disalin ke clipboard!');
    } catch {
      prompt('Salin link berikut:', data.signedUrl);
    }
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const { data: sessionData } = await sb.auth.getSession();
    if (!sessionData || !sessionData.session) {
      window.location.href = '../pages/login.html';
      return;
    }

    if (!storagePath || !fileName) {
      showError('File tidak ditemukan', 'Parameter file tidak valid. Silakan kembali ke dashboard dan pilih file lagi.');
      return;
    }

    document.title = 'MyStorage — ' + fileName;
    document.getElementById('fileTitle').textContent = fileName;
    document.getElementById('fileMeta').textContent = fileSize
      ? fileSize + ' · ' + (fileType || '').toUpperCase()
      : (fileType || '').toUpperCase();

    const { data, error } = await sb.storage.from('user-files').createSignedUrl(storagePath, 3600);
    if (error) {
      showError('Gagal membuka file', 'Tidak dapat membuat link akses: ' + error.message + '. Pastikan Anda memiliki akses ke file ini.');
      return;
    }

    signedUrl = data.signedUrl;
    renderViewer(signedUrl, fileType, fileName);
  });
</script>
</body>
</html>
