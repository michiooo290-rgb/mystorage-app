<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyStorage — Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    :root {
      --bg-deep: #0a0a1a;
      --bg-base: #0f0d1a;
      --bg-surface: rgba(255,255,255,0.05);
      --bg-glass: rgba(15,13,26,0.88);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.14);
      --accent: #7c3aed;
      --accent-2: #a855f7;
      --accent-light: rgba(124,58,237,0.12);
      --text: #e2e8f0;
      --text-2: #cbd5e1;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --radius: 14px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Mesh Background ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(168,85,247,0.05) 0%, transparent 70%);
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px;
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .btn-back {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-back:hover {
      background: var(--accent-light);
      border-color: rgba(124,58,237,0.3);
      color: var(--text);
    }

    .file-title {
      flex: 1; min-width: 0;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .file-meta {
      font-size: 12px; color: var(--text-faint);
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }

    .btn-action {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--text-muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-action:hover {
      background: var(--accent-light);
      border-color: rgba(124,58,237,0.35);
      color: var(--text);
    }
    .btn-action.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-action.primary:hover {
      background: #6d28d9;
      border-color: #6d28d9;
    }

    /* ── Content area ── */
    .viewer-wrap {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Loading State ── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state p { font-size: 14px; }

    /* ── Error State ── */
    .error-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; text-align: center;
      padding: 40px;
    }
    .error-state i { font-size: 52px; color: #ef4444; opacity: 0.7; }
    .error-state h3 { font-size: 18px; color: var(--text); }
    .error-state p { font-size: 13px; color: var(--text-muted); max-width: 380px; line-height: 1.6; }

    /* ── PDF Viewer ── */
    iframe.pdf-viewer {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    /* ── Image Viewer ── */
    .img-viewer-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      overflow: auto;
    }
    .img-viewer-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    /* ── Video Player ── */
    .video-viewer-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: #000;
    }
    video {
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius);
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }

    /* ── Audio Player ── */
    .audio-viewer-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 40px;
    }
    .audio-icon-big {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(168,85,247,0.15);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(168,85,247,0.3);
      animation: pulse-ring 2s ease-in-out infinite;
    }
    .audio-icon-big i { font-size: 44px; color: #a855f7; }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.3); }
      50% { box-shadow: 0 0 0 16px rgba(168,85,247,0.05); }
    }
    .audio-name {
      font-size: 18px; font-weight: 600; color: var(--text);
      text-align: center; max-width: 360px;
    }
    audio {
      width: 380px; max-width: 90vw;
    }

    /* ── Generic / Unsupported ── */
    .generic-viewer {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px; text-align: center;
    }
    .generic-icon-box {
      width: 90px; height: 90px;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
    }
    .generic-viewer h3 { font-size: 18px; font-weight: 600; color: var(--text); }
    .generic-viewer p { font-size: 13px; color: var(--text-muted); max-width: 340px; line-height: 1.7; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,27,50,0.95);
      border: 1px solid var(--border-hover);
      backdrop-filter: blur(16px);
      padding: 12px 20px;
      border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- Topbar -->
<div class="topbar">
  <a class="btn-back" href="Storage-dasboard.html">
    <i class="ti ti-arrow-left"></i> Kembali
  </a>
  <div class="file-title" id="fileTitle">Memuat file...</div>
  <div class="file-meta" id="fileMeta"></div>
  <div class="topbar-actions">
    <button class="btn-action" id="btnShare" onclick="shareFile()">
      <i class="ti ti-share"></i> Bagikan
    </button>
    <button class="btn-action primary" id="btnDownload" onclick="downloadFile()">
      <i class="ti ti-download"></i> Download
    </button>
  </div>
</div>

<!-- Viewer -->
<div class="viewer-wrap" id="viewerWrap">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Memuat file...</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="ti ti-check" style="font-size:16px;color:#4ade80;flex-shrink:0"></i>
  <span id="toastMsg">Berhasil!</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://cgmoxqvdihiewdgxqxlh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnbW94cXZkaWhpZXdkZ3hxeGxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjYzMjYsImV4cCI6MjA5NDg0MjMyNn0.VpifdxYoJFb-6HA6fNmK2g0rBJGZTNfklwTafCOci6U';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let signedUrl = null;
  let fileData = null;

  /* ── Parse URL params ── */
  const params = new URLSearchParams(window.location.search);
  const storagePath = params.get('path');   // storage path di Supabase
  const fileName    = params.get('name');   // nama file asli
  const fileType    = params.get('type');   // pdf / foto / video / audio / doc / spreadsheet
  const fileSize    = params.get('size');   // ukuran string

  /* ── FILE_ICONS mapping ── */
  const FILE_ICONS = {
    pdf:         { icon: 'ti-file-type-pdf', color: '#ef4444', bg: '#fff0f0' },
    doc:         { icon: 'ti-file-text',     color: '#6366f1', bg: '#eef2ff' },
    foto:        { icon: 'ti-photo',         color: '#22c55e', bg: '#dcfce7' },
    video:       { icon: 'ti-video',         color: '#f97316', bg: '#fff7ed' },
    spreadsheet: { icon: 'ti-table',         color: '#0ea5e9', bg: '#f0f9ff' },
    audio:       { icon: 'ti-music',         color: '#a855f7', bg: '#f3e8ff' },
  };

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    const icon = t.querySelector('i');
    if (isError) { icon.className = 'ti ti-alert-circle'; icon.style.color = '#ef4444'; }
    else { icon.className = 'ti ti-check'; icon.style.color = '#4ade80'; }
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function showError(msg, detail) {
    document.getElementById('loadingState').remove();
    document.getElementById('viewerWrap').innerHTML = `
      <div class="error-state">
        <i class="ti ti-file-alert"></i>
        <h3>${msg}</h3>
        <p>${detail || ''}</p>
        <a href="Storage-dasboard.html" class="btn-action" style="margin-top:8px">
          <i class="ti ti-arrow-left"></i> Kembali ke Dashboard
        </a>
      </div>`;
  }

  /* ── Render berdasarkan tipe file ── */
  async function renderViewer(url, type, name) {
    const wrap = document.getElementById('viewerWrap');

    if (type === 'pdf') {
      wrap.innerHTML = `<iframe class="pdf-viewer" src="${url}" title="${name}"></iframe>`;
    }
    else if (type === 'foto') {
      wrap.innerHTML = `
        <div class="img-viewer-wrap">
          <img src="${url}" alt="${name}" onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.4s ease"/>
        </div>`;
    }
    else if (type === 'video') {
      wrap.innerHTML = `
        <div class="video-viewer-wrap">
          <video controls autoplay>
            <source src="${url}">
            Browser Anda tidak mendukung pemutaran video.
          </video>
        </div>`;
    }
    else if (type === 'audio') {
      const nameEsc = name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      wrap.innerHTML = `
        <div class="audio-viewer-wrap">
          <div class="audio-icon-big"><i class="ti ti-music"></i></div>
          <div class="audio-name">${nameEsc}</div>
          <audio controls autoplay>
            <source src="${url}">
            Browser Anda tidak mendukung pemutaran audio.
          </audio>
        </div>`;
    }
    else if (type === 'spreadsheet' || type === 'doc') {
      // Download file dulu sebagai blob, lalu buat object URL untuk ditampilkan
      const ext = name.split('.').pop().toLowerCase();
      const isPdf = (ext === 'pdf');
      // Untuk .txt bisa langsung iframe, untuk office format perlu download
      if (ext === 'txt') {
        wrap.innerHTML = `<iframe class="pdf-viewer" src="${url}" title="${name}" style="background:#1a1a2e;color:#e2e8f0"></iframe>`;
        return;
      }
      // Tampilkan loading sementara fetch blob
      wrap.innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Mengunduh file untuk preview...</p>
        </div>`;
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const blobUrl = URL.createObjectURL(blob);
        const nameEsc = name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const iconInfo = FILE_ICONS[type] || FILE_ICONS['doc'];
        wrap.innerHTML = `
          <div class="generic-viewer">
            <div class="generic-icon-box" style="background:${iconInfo.bg}">
              <i class="ti ${iconInfo.icon}" style="color:${iconInfo.color}"></i>
            </div>
            <h3>${nameEsc}</h3>
            <p>File <strong>${ext.toUpperCase()}</strong> tidak bisa ditampilkan langsung di browser.<br>
            Gunakan tombol di bawah untuk membuka atau mengunduh file ini.</p>
            <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center">
              <a href="${blobUrl}" download="${name}" class="btn-action primary" style="display:flex;align-items:center;gap:6px;text-decoration:none">
                <i class="ti ti-download"></i> Download & Buka
              </a>
              <button class="btn-action" onclick="window.open('${blobUrl}')">
                <i class="ti ti-external-link"></i> Buka di Tab Baru
              </button>
            </div>
            <p style="font-size:11.5px;color:var(--text-faint);margin-top:16px">Tip: Setelah download, buka dengan Microsoft Office, LibreOffice, atau Google Drive.</p>
          </div>`;
      } catch(e) {
        // Fallback jika fetch gagal
        const nameEsc = name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const iconInfo = FILE_ICONS[type] || FILE_ICONS['doc'];
        wrap.innerHTML = `
          <div class="generic-viewer">
            <div class="generic-icon-box" style="background:${iconInfo.bg}">
              <i class="ti ${iconInfo.icon}" style="color:${iconInfo.color}"></i>
            </div>
            <h3>${nameEsc}</h3>
            <p>File ini tidak bisa ditampilkan langsung. Gunakan tombol <strong>Download</strong> di atas.</p>
          </div>`;
      }
    }
    else {
      // Unsupported — tampilkan icon + tombol download
      const iconInfo = FILE_ICONS[type] || FILE_ICONS['doc'];
      const nameEsc = name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      wrap.innerHTML = `
        <div class="generic-viewer">
          <div class="generic-icon-box" style="background:${iconInfo.bg}">
            <i class="ti ${iconInfo.icon}" style="color:${iconInfo.color}"></i>
          </div>
          <h3>${nameEsc}</h3>
          <p>Tipe file ini tidak bisa ditampilkan langsung di browser.<br>Gunakan tombol <strong>Download</strong> untuk membuka file ini di aplikasi yang sesuai.</p>
          <button class="btn-action primary" onclick="downloadFile()">
            <i class="ti ti-download"></i> Download File
          </button>
        </div>`;
    }
  }

  /* ── Download ── */
  async function downloadFile() {
    if (!storagePath) return;
    showToast('Menyiapkan download...');
    const { data, error } = await sb.storage.from('user-files').download(storagePath);
    if (error) { showToast('Gagal download: ' + error.message, true); return; }
    const url = URL.createObjectURL(data);
    const a = document.createElement('a');
    a.href = url; a.download = fileName || 'file';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Download dimulai!');
  }

  /* ── Share ── */
  async function shareFile() {
    if (!storagePath) return;
    showToast('Membuat link...');
    const { data, error } = await sb.storage.from('user-files').createSignedUrl(storagePath, 604800);
    if (error) { showToast('Gagal membuat link: ' + error.message, true); return; }

    // Simpan ke localStorage supaya muncul di panel "Dibagikan" di dashboard
    try {
      let saved = JSON.parse(localStorage.getItem('myStorageShared') || '[]');
      // Hindari duplikat berdasarkan storagePath
      saved = saved.filter(function(s) { return s.fileId !== storagePath; });
      saved.unshift({
        fileId: storagePath,
        name: fileName || 'File',
        url: data.signedUrl,
        type: fileType || 'doc',
        folder: storagePath.split('/')[0] || '',
        createdAt: Date.now()
      });
      if (saved.length > 50) saved = saved.slice(0, 50);
      localStorage.setItem('myStorageShared', JSON.stringify(saved));
    } catch(e) {
      console.warn('Gagal simpan shared link:', e);
    }

    try {
      await navigator.clipboard.writeText(data.signedUrl);
      showToast('Link berhasil disalin ke clipboard!');
    } catch {
      prompt('Salin link berikut:', data.signedUrl);
    }
  }

  /* ── INIT ── */
  document.addEventListener('DOMContentLoaded', async function() {
    // Cek auth
    const { data: sessionData } = await sb.auth.getSession();
    if (!sessionData || !sessionData.session) {
      window.location.href = 'login.html';
      return;
    }

    // Validasi params
    if (!storagePath || !fileName) {
      showError('File tidak ditemukan', 'Parameter file tidak valid. Silakan kembali ke dashboard dan pilih file lagi.');
      return;
    }

    // Set judul
    document.title = 'MyStorage — ' + fileName;
    document.getElementById('fileTitle').textContent = fileName;
    document.getElementById('fileMeta').textContent = fileSize ? fileSize + ' · ' + (fileType || '').toUpperCase() : (fileType || '').toUpperCase();

    // Generate signed URL (valid 1 jam)
    const { data, error } = await sb.storage.from('user-files').createSignedUrl(storagePath, 3600);
    if (error) {
      showError('Gagal membuka file', 'Tidak dapat membuat link akses: ' + error.message + '. Pastikan Anda memiliki akses ke file ini.');
      return;
    }

    signedUrl = data.signedUrl;
    renderViewer(signedUrl, fileType, fileName);
  });
</script>
</body>
</html>
